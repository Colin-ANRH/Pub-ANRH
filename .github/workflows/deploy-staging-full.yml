name: Deploy staging OVH — complet (1ère fois)

on:
  workflow_dispatch:

concurrency:
  group: deploy-staging-ovh-full
  cancel-in-progress: true

jobs:
  deploy-full:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Préparer fichiers OVH
        env:
          OVH_DB_PASSWORD: ${{ secrets.OVH_DB_PASSWORD }}
          STAGING_GATE_USER: ${{ secrets.STAGING_GATE_USER }}
          STAGING_GATE_PASSWORD: ${{ secrets.STAGING_GATE_PASSWORD }}
          DEPLOY_UNZIP_TOKEN: ${{ secrets.DEPLOY_UNZIP_TOKEN }}
        run: |
          php deploy-ovh/build-wp-config.php
          cp deploy-ovh/.htaccess .htaccess
          mkdir -p upload-bundle
          sed "s/CHANGE_ME/${DEPLOY_UNZIP_TOKEN}/" deploy-ovh/unzip-staging.php > upload-bundle/unzip-staging.php

      - name: Créer l'archive deploy.zip
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq zip
          zip -r upload-bundle/deploy.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "deploy-ovh/*" \
            -x "upload-bundle/*" \
            -x "export*.sql" \
            -x ".gitignore" \
            -x "readme.html" \
            -x "license.txt" \
            -x "wp-content/updraft/*" \
            -x "wp-content/upgrade/*" \
            -x "wp-content/cache/*"
          ls -lh upload-bundle/

      - name: Publier deploy.zip (téléchargement GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: deploy-pub-anrh-zip
          path: upload-bundle/deploy.zip
          retention-days: 7

      - name: Envoyer zip + unzip (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.OVH_FTP_SERVER }}
          username: ${{ secrets.OVH_FTP_USERNAME }}
          password: ${{ secrets.OVH_FTP_PASSWORD }}
          local-dir: upload-bundle/
          server-dir: pub.anrh.fr/
          log-level: standard

      - name: Décompresser sur le serveur
        env:
          DEPLOY_UNZIP_TOKEN: ${{ secrets.DEPLOY_UNZIP_TOKEN }}
        run: |
          for URL in "https://pub.anrh.fr/unzip-staging.php" "https://www.pub.anrh.fr/unzip-staging.php"; do
            if curl -fsS "${URL}?token=${DEPLOY_UNZIP_TOKEN}"; then
              echo "Decompression OK via ${URL}"
              exit 0
            fi
          done
          echo "::warning::Decompression HTTP impossible. Extrayez deploy.zip manuellement via FTP/FileZilla dans www/pub.anrh.fr/"
