name: Deploy staging OVH (pub.anrh.fr)

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-staging-ovh
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Syntaxe PHP (theme)
        run: |
          find wp-content/themes/anrhpub_theme -name '*.php' -print0 | while IFS= read -r -d '' file; do
            php -l "$file" || exit 1
          done

      - name: Securite — pas de mots de passe en dur
        run: |
          if grep -rE "Anrh-(Admin|Client)-[0-9]{4}" wp-content/themes/anrhpub_theme; then
            echo "::error::Mots de passe en dur detectes dans le theme"
            exit 1
          fi

      - name: Securite — migration PrestaShop CLI uniquement
        run: |
          grep -q "CLI uniquement" wp-content/themes/anrhpub_theme/tools/migrate-prestashop.php

      - name: Test generation wp-config
        env:
          OVH_DB_PASSWORD: test-db-password
          STAGING_GATE_USER: ci-user
          STAGING_GATE_PASSWORD: ci-password
        run: php deploy-ovh/build-wp-config.php

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build JS theme (Vite)
        working-directory: wp-content/themes/anrhpub_theme
        run: |
          npm install
          npm run build || python bin/build-main-js.py

      - name: PHPUnit (B2B, panier, devis)
        working-directory: wp-content/themes/anrhpub_theme
        run: |
          composer install --no-interaction --prefer-dist
          composer test

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Préparer le bundle de déploiement
        env:
          OVH_DB_PASSWORD: ${{ secrets.OVH_DB_PASSWORD }}
          STAGING_GATE_USER: ${{ secrets.STAGING_GATE_USER }}
          STAGING_GATE_PASSWORD: ${{ secrets.STAGING_GATE_PASSWORD }}
        run: |
          cd wp-content/themes/anrhpub_theme
          npm install
          npm run build || python bin/build-main-js.py
          cd ../../..
          php deploy-ovh/build-wp-config.php
          mkdir -p deploy-bundle/wp-content/themes
          mkdir -p deploy-bundle/wp-content/mu-plugins
          mkdir -p deploy-bundle/wp-content/uploads
          mkdir -p deploy-bundle/wp-content/plugins
          cp wp-config.php deploy-bundle/
          cp deploy-ovh/.htaccess deploy-bundle/.htaccess
          cp deploy-ovh/staging-health.php deploy-bundle/staging-health.php
          cp *.php deploy-bundle/
          cp wp-content/mu-plugins/anrh-staging-gate.php deploy-bundle/wp-content/mu-plugins/
          cp wp-content/themes/index.php deploy-bundle/wp-content/themes/ 2>/dev/null || true
          for theme_dir in wp-content/themes/*/; do
            [ -d "$theme_dir" ] || continue
            theme_name=$(basename "$theme_dir")
            mkdir -p "deploy-bundle/wp-content/themes/$theme_name"
            if [ "$theme_name" = "anrhpub_theme" ]; then
              rsync -a --exclude='bin/' --exclude='tools/' --exclude='tests/' --exclude='vendor/' --exclude='node_modules/' "${theme_dir}/" "deploy-bundle/wp-content/themes/$theme_name/"
            else
              cp -r "${theme_dir}." "deploy-bundle/wp-content/themes/$theme_name/"
            fi
          done
          cp -r wp-content/uploads/* deploy-bundle/wp-content/uploads/ 2>/dev/null || true
          cp -r wp-content/plugins/* deploy-bundle/wp-content/plugins/
          if [ -n "${{ secrets.OVH_FTP_REMOTE_DIR }}" ]; then
            echo "REMOTE_DIR=${{ secrets.OVH_FTP_REMOTE_DIR }}" >> $GITHUB_ENV
          else
            echo "REMOTE_DIR=pub.anrh.fr/" >> $GITHUB_ENV
          fi

      - name: Déployer sur OVH (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.OVH_FTP_SERVER }}
          username: ${{ secrets.OVH_FTP_USERNAME }}
          password: ${{ secrets.OVH_FTP_PASSWORD }}
          local-dir: deploy-bundle/
          server-dir: ${{ env.REMOTE_DIR }}
          state-name: ovh-pub-anrh-fr
          log-level: minimal

      - name: Smoke test (assets theme)
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 30 \
            -A "ANRH-Deploy-SmokeTest/1.0" \
            "https://pub.anrh.fr/wp-content/themes/anrhpub_theme/style.css" || echo "000")
          echo "HTTP $code"
          case "$code" in
            200|301|302)
              echo "Site accessible."
              ;;
            401|403)
              echo "::warning::HTTP $code — protection OVH/GitHub IP probable, deploy FTP OK."
              ;;
            *)
              echo "::error::Site injoignable (HTTP $code)"
              exit 1
              ;;
          esac
