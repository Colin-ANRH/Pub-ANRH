name: Deploy staging OVH (pub.anrh.fr)

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-staging-ovh
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Préparer fichiers OVH
        env:
          OVH_DB_PASSWORD: ${{ secrets.OVH_DB_PASSWORD }}
        run: |
          php deploy-ovh/build-wp-config.php
          cp deploy-ovh/.htaccess .htaccess

      - name: Déployer sur OVH (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.OVH_FTP_SERVER }}
          username: ${{ secrets.OVH_FTP_USERNAME }}
          password: ${{ secrets.OVH_FTP_PASSWORD }}
          # Racine FTP = home OVH. Ajuster si votre FTP s'ouvre déjà dans www/
          server-dir: www/pub.anrh.fr/
          exclude: |
            **/.git*
            **/.github/**
            deploy-ovh/**
            export*.sql
            .gitignore
            readme.html
            license.txt
